<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoolTerminal - 正在启动...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f12;
            color: #e5e5e7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .loading-container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Logo 或应用名称 */
        .app-name {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        /* 旋转加载器 */
        .spinner-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
        }

        .spinner {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #6366f1;
            border-right-color: #6366f1;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .spinner-inner {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #818cf8;
            border-right-color: #818cf8;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* 加载文本 */
        .loading-text {
            font-size: 16px;
            color: #a1a1aa;
            margin-bottom: 12px;
            animation: pulse 2s ease-in-out infinite;
        }

        .loading-status {
            font-size: 14px;
            color: #71717a;
            font-weight: 500;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* 背景动画效果 */
        .floating-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }

        .blob1 {
            width: 300px;
            height: 300px;
            background: #6366f1;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .blob2 {
            width: 250px;
            height: 250px;
            background: #818cf8;
            bottom: -80px;
            right: -80px;
            animation-delay: -10s;
        }

        .blob3 {
            width: 200px;
            height: 200px;
            background: #4f46e5;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* 进度点 */
        .dots {
            display: inline-block;
            width: 40px;
            text-align: left;
        }

        .dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% {
                content: '.';
            }
            40% {
                content: '..';
            }
            60%, 100% {
                content: '...';
            }
        }
    </style>
</head>
<body>
    <!-- 浮动背景 -->
    <div class="floating-background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <!-- 加载内容 -->
    <div class="loading-container">
        <div class="app-name">CoolTerminal</div>

        <div class="spinner-container">
            <div class="spinner"></div>
            <div class="spinner-inner"></div>
        </div>

        <div class="loading-text">正在启动应用<span class="dots"></span></div>
        <div class="loading-status" id="status">初始化服务器</div>
    </div>

    <script>
        // 模拟加载状态更新
        const statuses = [
            '初始化服务器',
            '启动 Python 后端',
            '等待服务器响应',
            '正在连接',
            '即将完成'
        ];

        let currentIndex = 0;
        const statusEl = document.getElementById('status');

        const updateStatus = () => {
            currentIndex = (currentIndex + 1) % statuses.length;
            statusEl.textContent = statuses[currentIndex];
        };

        // 每2秒更新一次状态
        setInterval(updateStatus, 2000);
    </script>
</body>
</html>
