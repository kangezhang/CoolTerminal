<div class="page-header">
    <h1 class="page-title">设备管理</h1>
    <p class="page-subtitle">配对设备 · 激活连接 · 开始通信</p>
    <p class="page-subtitle" style="margin-top: 8px; font-size: 13px; color: var(--text-tertiary); display: flex; align-items: center; gap: 8px;">
        <i data-feather="info" style="width: 16px; height: 16px;"></i>
        <span>提示：配对设备后，点击"激活"按钮即可自动连接并启用聊天和文件同步功能</span>
    </p>
</div>

<!-- 本设备信息 -->
<div class="device-info-card">
    <div class="device-card-header">
        <div class="device-card-icon">
            <i data-feather="smartphone"></i>
        </div>
        <div class="device-card-title">
            <div class="device-card-name">本设备信息</div>
            <div class="device-card-os">当前设备的基本信息</div>
        </div>
    </div>

    <div class="device-card-body">
        <div class="device-info-row">
            <i data-feather="user" class="info-icon"></i>
            <span class="info-label">设备名称</span>
            <span id="deviceName" class="info-value">加载中...</span>
            <button class="btn-icon btn-sm" onclick="editDeviceName()" title="编辑名称">
                <i data-feather="edit-2"></i>
            </button>
        </div>

        <div class="device-info-row">
            <i data-feather="hash" class="info-icon"></i>
            <span class="info-label">设备ID</span>
            <span id="deviceId" class="info-value device-id-mono">加载中...</span>
            <button class="btn-icon btn-sm" onclick="copyDeviceId()" title="复制ID">
                <i data-feather="copy"></i>
            </button>
        </div>

        <div class="device-info-row">
            <i data-feather="users" class="info-icon"></i>
            <span class="info-label">已配对设备</span>
            <span id="pairedCount" class="info-value">0</span>
        </div>
    </div>
</div>

<!-- 当前激活设备 -->
<div class="glass-card">
    <div class="card-header">
        <h3 class="card-title">当前激活设备</h3>
        <p class="card-subtitle">聊天和文件同步将使用此设备进行通信</p>
    </div>
    <div id="activeDeviceInfo">
        <p class="empty-hint">暂无激活的设备，请先配对设备并点击"激活"按钮</p>
    </div>
</div>

<!-- 配对新设备 -->
<div class="pair-new-device-card">
    <div class="device-card-header">
        <div class="device-card-icon" style="background: linear-gradient(135deg, #10b981, #14b8a6);">
            <i data-feather="user-plus"></i>
        </div>
        <div class="device-card-title">
            <div class="device-card-name">配对新设备</div>
            <div class="device-card-os">输入对方设备地址，发起配对请求</div>
        </div>
    </div>

    <div class="device-card-body">
        <!-- 分离输入IP和端口 -->
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 16px;">
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label">
                    <i data-feather="globe" style="width: 14px; height: 14px; vertical-align: middle; margin-right: 4px;"></i>
                    对方IP地址
                </label>
                <input type="text" id="pairIp" class="form-input" placeholder="192.168.1.100"
                       oninput="updatePairUrl()">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label">
                    <i data-feather="radio" style="width: 14px; height: 14px; vertical-align: middle; margin-right: 4px;"></i>
                    端口
                </label>
                <input type="text" id="pairPort" class="form-input" placeholder="5001" value="5001"
                       oninput="updatePairUrl()">
            </div>
        </div>

        <!-- 显示完整URL -->
        <div class="form-group">
            <label class="form-label">
                <i data-feather="link" style="width: 14px; height: 14px; vertical-align: middle; margin-right: 4px;"></i>
                完整地址（自动生成）
            </label>
            <input type="text" id="pairUrl" class="form-input" placeholder="http://192.168.1.100:5001" readonly
                   style="background: rgba(255,255,255,0.05); cursor: default; font-family: 'Monaco', monospace; font-size: 13px;">
        </div>

        <details class="advanced-options" style="margin-bottom: 16px;">
            <summary class="advanced-summary">
                <i data-feather="settings" style="width: 14px; height: 14px;"></i>
                <span>高级选项：指定本机回调地址（可选）</span>
            </summary>
            <div class="form-group" style="margin-top: 12px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 8px;">
                <label class="form-label">本机回调地址（留空自动检测）</label>
                <input type="text" id="localCallbackUrl" class="form-input"
                       placeholder="http://192.168.1.101:5001"
                       style="font-family: 'Monaco', monospace; font-size: 13px;">
                <p class="hint-text" style="margin: 8px 0 0 0; padding: 8px; background: rgba(255,187,0,0.1); border-left: 3px solid var(--warning);">
                    <i data-feather="alert-circle" style="width: 14px; height: 14px;"></i>
                    <span>如果对方无法回调您，请手动指定您的真实IP地址</span>
                </p>
            </div>
        </details>
    </div>

    <div class="device-card-actions">
        <button class="btn btn-primary" style="flex: 1;" onclick="sendPairRequest()">
            <i data-feather="radio"></i>
            <span>发送配对请求</span>
        </button>
    </div>
</div>

<!-- 待确认的配对请求 -->
<div class="glass-card" id="pendingSection" style="display: none;">
    <div class="card-header">
        <h3 class="card-title">待确认的配对请求</h3>
    </div>
    <div id="pendingList" class="pending-list">
        <!-- 动态生成 -->
    </div>
</div>

<!-- 已配对设备列表 -->
<div class="glass-card">
    <div class="card-header">
        <h3 class="card-title">已配对设备</h3>
        <button class="btn btn-secondary" onclick="refreshPairedDevices()">
            <i data-feather="refresh-cw"></i>
            <span>刷新</span>
        </button>
    </div>
    <div id="pairedDevicesList" class="paired-devices-list">
        <p class="empty-hint">暂无已配对的设备</p>
    </div>
</div>
