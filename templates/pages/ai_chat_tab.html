<div class="page-header ai-chat-header">
    <div class="ai-chat-header-left">
        <h1 class="page-title">AI 聊天</h1>
        <span class="ai-model-badge" id="aiModelDisplay">加载中...</span>
    </div>

    <div class="page-header-actions">
        <button class="btn btn-secondary btn-sm" onclick="AIChatManager.openHistory()" title="查看聊天记录">
            <i data-feather="clock" style="width: 16px; height: 16px; margin-right: 4px;"></i>
            <span>记录</span>
        </button>
        <button class="btn btn-secondary btn-sm" onclick="AIChatManager.newChat()" title="新建聊天">
            <i data-feather="plus" style="width: 16px; height: 16px; margin-right: 4px;"></i>
            <span>新建</span>
        </button>
        <button class="btn btn-secondary btn-sm" onclick="AIChatManager.openSettings()" title="设置">
            <i data-feather="settings" style="width: 16px; height: 16px; margin-right: 4px;"></i>
            <span>设置</span>
        </button>
    </div>
</div>

<div class="chat-container" id="aiChatContainer">
    <div class="chat-messages" id="aiChatMessages">
        <div class="message remote">
            <div class="message-avatar">AI</div>
            <div class="message-content">
                <div class="message-bubble markdown-content">
                    你好！我是 AI 助手。你可以向我提问任何问题，我会尽力帮助你。
                    <br><br>
                    <strong>提示：</strong>
                    <ul style="margin: 8px 0; padding-left: 20px;">
                        <li>我支持 Markdown 格式和代码高亮</li>
                        <li>请先在设置中配置 API 密钥</li>
                        <li>支持 OpenAI、Anthropic、Gemini 等多个 AI 提供商</li>
                    </ul>
                </div>
                <div class="message-time">--:--:--</div>
            </div>
        </div>
    </div>

    <div class="chat-input-area">
        <div class="chat-input-wrapper">
            <textarea class="chat-input" id="aiChatInput" placeholder="输入消息，按 Enter 发送，Shift+Enter 换行" rows="1"></textarea>
            <button class="btn btn-primary" id="aiSendBtn" onclick="AIChatManager.send()">
                <i data-feather="send" style="width: 16px; height: 16px;"></i>
                <span>发送</span>
            </button>
        </div>
    </div>
</div>
