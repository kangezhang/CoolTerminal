<!-- 终端页面 -->
<div class="page-header terminal-header">
    <div class="terminal-header-left">
        <h1 class="page-title">CoolTerminal</h1>
    </div>
    <div class="page-header-actions">
        <button class="btn-icon" onclick="TerminalManager.clearScreen()" title="清空终端">
            <i data-feather="trash-2"></i>
        </button>
        <button class="btn-icon" onclick="TerminalManager.toggleHistory()" title="命令历史" id="historyToggleBtn">
            <i data-feather="clock"></i>
        </button>
        <button class="btn-icon" onclick="openCommandReference()" title="命令参考">
            <i data-feather="book-open"></i>
        </button>
    </div>
</div>

<div class="terminal-container">
    <!-- 终端主体 -->
    <div class="terminal-main" id="terminalMain">
        <div class="terminal-output" id="terminalOutput">
            <!-- 欢迎消息 -->
            <div class="terminal-line welcome-message">
                <span class="terminal-prompt">></span>
                <span class="terminal-text">欢迎使用 CoolTerminal - 现代化终端模拟器</span>
            </div>
            <div class="terminal-line">
                <span class="terminal-prompt">></span>
                <span class="terminal-text">输入 <span class="command-highlight">help</span> 查看可用命令</span>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="terminal-input-area">
            <span class="terminal-prompt" id="terminalPromptDisplay">></span>
            <input
                type="text"
                id="terminalInput"
                class="terminal-input"
                placeholder="输入命令..."
                autocomplete="off"
                spellcheck="false"
            />
        </div>
    </div>

    <!-- 命令历史侧边栏 -->
    <div class="terminal-history-panel" id="historyPanel">
        <div class="history-header">
            <h3 class="history-title">命令历史</h3>
            <button class="btn-icon btn-sm" onclick="TerminalManager.clearHistory()" title="清空历史">
                <i data-feather="trash-2"></i>
            </button>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-empty">
                <i data-feather="terminal" style="width: 32px; height: 32px; opacity: 0.3;"></i>
                <p>暂无命令历史</p>
            </div>
        </div>
    </div>
</div>
