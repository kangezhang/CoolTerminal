<div class="page-header">
    <h1 class="page-title">聊天</h1>
    <p class="page-subtitle">与远程设备实时通信 · 消息自动保存</p>
</div>

<div class="chat-container" id="chatContainer">
    <div class="chat-messages" id="chatMessages">
        <div class="message remote">
            <div class="message-avatar">R</div>
            <div class="message-content">
                <div class="message-bubble">
                    欢迎！消息会自动保存在本地，断线后重连会继续发送。
                </div>
                <div class="message-time">00:00:00</div>
            </div>
        </div>
    </div>

    <!-- 拖拽覆盖层 -->
    <div class="drag-overlay" id="dragOverlay">
        <div class="drag-content">
            <i data-feather="folder" class="drag-icon-svg" style="width: 64px; height: 64px;"></i>
            <div class="drag-text">拖放文件或文件夹到这里</div>
        </div>
    </div>

    <div class="chat-input-area">
        <!-- 已选文件预览 -->
        <div class="selected-files" id="selectedFiles"></div>

        <div class="chat-input-wrapper">
            <input type="file" id="fileInput" multiple style="display: none;" onchange="handleFileSelect(event)">
            <button class="btn-icon" id="attachBtn" onclick="document.getElementById('fileInput').click()" title="附加文件（或拖拽文件/文件夹到聊天区域）">
                <i data-feather="paperclip"></i>
            </button>
            <textarea class="chat-input" id="chatInput" placeholder="输入消息，按Enter发送，Shift+Enter换行" rows="1"></textarea>
            <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">
                <i data-feather="send" style="width: 16px; height: 16px;"></i>
                <span>发送</span>
            </button>
        </div>
    </div>
</div>
