<!-- AI 聊天记录管理弹窗 -->
<div class="modal-overlay" id="aiHistoryModal" style="display: none;">
    <div class="modal" style="max-width: 700px; max-height: 80vh;">
        <div class="modal-header">
            <h2 class="modal-title">聊天记录</h2>
            <button class="btn-icon" onclick="AIChatManager.closeHistory()" title="关闭">
                <i data-feather="x" style="width: 20px; height: 20px;"></i>
            </button>
        </div>

        <div class="modal-body" style="max-height: calc(80vh - 140px); overflow-y: auto;">
            <!-- 会话列表 -->
            <div id="aiSessionList" class="session-list">
                <!-- 动态生成会话列表 -->
            </div>

            <!-- 空状态 -->
            <div id="aiSessionEmpty" class="empty-state" style="display: none;">
                <p style="color: var(--text-tertiary); text-align: center; padding: 40px 20px;">
                    暂无聊天记录
                </p>
            </div>
        </div>
    </div>
</div>
