<aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <div class="brand">
            <div class="brand-icon">CT</div>
            <div class="brand-text">
                <div class="brand-name">CoolTerminal</div>
                <div class="brand-version">v{{ version }}</div>
            </div>
        </div>
        <button class="btn-sidebar-toggle" onclick="toggleSidebar()" title="收缩侧边栏">
            <i data-feather="chevron-left" id="sidebarToggleIcon"></i>
        </button>
    </div>

    <!-- 终端标签列表 -->
    <div class="terminal-tabs-section">
        <div class="terminal-tabs-header">
            <h3 class="terminal-tabs-title">终端</h3>
            <button class="btn-new-terminal" onclick="TerminalManager.createNewTerminal()" title="新建终端">
                <i data-feather="plus"></i>
            </button>
        </div>
        <div class="terminal-tabs-list" id="terminalTabsList">
            <!-- 终端标签将通过 JavaScript 动态添加 -->
        </div>
    </div>

    <div class="sidebar-footer">
        <div class="tool-section">
            <button class="tool-btn" onclick="showAbout()">
                <i data-feather="info" class="tool-icon"></i>
                <span>关于</span>
            </button>
        </div>
    </div>
</aside>
