<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sync Chat{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="floating-background">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
    </div>

    <div class="app-container">
        {% include 'components/sidebar.html' %}
        
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% include 'components/settings_modal.html' %}
    {% include 'components/about_modal.html' %}

    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>

    <script src="{{ url_for('static', filename='js/app.js') }}?v=4.3.1"></script>
    <script src="{{ url_for('static', filename='js/connection.js') }}?v=4.3.1"></script>
    {% block extra_js %}{% endblock %}

    <script>
        // 初始化 Feather Icons
        if (typeof feather !== 'undefined') {
            feather.replace();
        }
    </script>
</body>
</html>
